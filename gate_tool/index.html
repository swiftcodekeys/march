<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grandview Gate Tool</title>
  <base href="/gate_tool/" />

  <link rel="stylesheet" href="css/ultra_ds_g.css" />
  <style>
    /* Embed mode: hide Ultra UI; parent app provides controls */
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0b1220; }
    #mndv, #nv, #lg, #progress { display:none !important; }
    #main { width:100%; height:100%; position:relative; display:flex; align-items:center; justify-content:center; }
    /* Hide all Ultra's default canvases */
    #bg, #fg { display:none !important; }
    #usi { display:none !important; }
    #bgCV, #fgCV, #usicv, #cv0, #cv_ns { display:none !important; }
    /* Show ONLY the renderer canvas, scaled to fit */
    canvas#canvas { 
      display:block !important; 
      max-width:100% !important; 
      max-height:100% !important; 
      width:auto !important;
      height:auto !important;
      position:relative !important;
      margin:auto !important;
    }
  </style>
</head>
<body>
  <div id="main">
    <div id="gb">Loading…</div>
    <!-- Hidden container for preloading images -->
    <div id="imgc" style="display:none"></div>
    <!-- Ultra gate script appends internal canvases to #tx and then accesses them via window['cv_*'].
         Keep a hidden #tx container so those append operations succeed in embed mode. -->
    <div id="tx" style="display:none"></div>
    <div id="bg"><canvas id="bgCV" class="cv" width="980" height="548"></canvas></div>
    <!-- Ultra gate renderer expects a visible canvas with id=usicv (WebGL) -->
    <div id="usi"><canvas id="usicv" class="cv" width="980" height="548"></canvas></div>
    <!-- Keep cv0 for internal/offscreen usage if the script references it -->
    <canvas id="cv0" class="cv" width="1960" height="1096" style="display:none"></canvas>
    <!-- Ultra script also references an offscreen canvas id=cv_ns -->
    <canvas id="cv_ns" class="cv" width="980" height="548" style="display:none"></canvas>
    <div id="fg"><canvas id="fgCV" class="cv" width="980" height="548"></canvas></div>
    <div id="mndv"></div>
    <div id="nv"></div>
    <div id="progress"></div>
    <div id="lg"></div>
  </div>
  <script>
    // Check WebGL support before loading Three.js
    (function(){
      function testWebGL() {
        var canvas = document.createElement('canvas');
        var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        return !!gl;
      }
      
      if (!testWebGL()) {
        console.error('WebGL not available');
        document.body.innerHTML = '<div style="padding:40px;color:#fff;text-align:center;font-family:sans-serif;"><h2>WebGL Not Available</h2><p>Please enable hardware acceleration in Chrome settings:<br>chrome://settings/system</p></div>';
      }
    })();
  </script>
  <script src="js/jqmin.js"></script>
  <script src="js/jqm_min.js"></script>
  <script src="js/iscroll-lite.js"></script>
  <script src="js/three.min_086.js"></script>
  <script>
    // CRITICAL: Intercept THREE.Scene/Camera/Renderer creation to expose them globally
    (function(){
      // Capture Scene
      var origScene = THREE.Scene;
      THREE.Scene = function() {
        var scene = new origScene();
        window.scene = scene;
        console.log('✅ Scene captured globally');
        return scene;
      };
      THREE.Scene.prototype = origScene.prototype;
      
      // Capture Camera
      var origPerspectiveCamera = THREE.PerspectiveCamera;
      THREE.PerspectiveCamera = function() {
        var camera = new origPerspectiveCamera(...arguments);
        window.camera = camera;
        console.log('✅ Camera captured globally');
        return camera;
      };
      THREE.PerspectiveCamera.prototype = origPerspectiveCamera.prototype;
      
      // Capture Renderer (already patched below for texImage2D)
    })();
  </script>
  <script>
    // CRITICAL: Patch THREE.WebGLRenderer immediately after THREE.js loads
    (function(){
      var origRenderer = THREE.WebGLRenderer;
      THREE.WebGLRenderer = function(params) {
        var renderer = new origRenderer(params);
        window.renderer = renderer;
        console.log('✅ Renderer captured globally');
        var gl = renderer.context;
        
        // Patch texImage2D on the actual WebGL context
        var origTexImage2D = gl.texImage2D;
        gl.texImage2D = function() {
          try {
            return origTexImage2D.apply(this, arguments);
          } catch(e) {
            console.warn('texImage2D error suppressed, rendering continues');
            // Don't throw - let rendering continue
          }
        };
        
        return renderer;
      };
      THREE.WebGLRenderer.prototype = origRenderer.prototype;
    })();
  </script>
  <script src="js/Detector.js"></script>
  <script src="js/CopyShader.js"></script>
  <script src="js/RGBELoader.js"></script>
  <script src="js/HDRCubeTextureLoader.js"></script>
  <script src="js/PMREMGenerator.js"></script>
  <script src="js/PMREMCubeUVPacker.js"></script>
  <script>
    // Patch THREE.CanvasTexture BEFORE Ultra loads to fix texture errors
    (function(){
      // Patch THREE.Texture (base class) to handle invalid canvas data
      var origTexture = THREE.Texture;
      THREE.Texture = function(image, mapping, wrapS, wrapT, magFilter, minFilter, format, type, anisotropy) {
        var tex = new origTexture(image, mapping, wrapS, wrapT, magFilter, minFilter, format, type, anisotropy);
        // Disable mipmaps for all textures to avoid GL errors
        tex.generateMipmaps = false;
        tex.minFilter = THREE.LinearFilter;
        return tex;
      };
      THREE.Texture.prototype = origTexture.prototype;
      THREE.Texture.prototype.constructor = THREE.Texture;
      
      // Also patch CanvasTexture specifically
      var origCanvasTexture = THREE.CanvasTexture;
      THREE.CanvasTexture = function(canvas, mapping, wrapS, wrapT, magFilter, minFilter, format, type, anisotropy) {
        var tex = new origCanvasTexture(canvas, mapping, wrapS, wrapT, magFilter, minFilter, format, type, anisotropy);
        tex.generateMipmaps = false;
        tex.minFilter = THREE.LinearFilter;
        return tex;
      };
      THREE.CanvasTexture.prototype = origCanvasTexture.prototype;
      THREE.CanvasTexture.prototype.constructor = THREE.CanvasTexture;
      
      // CRITICAL: Patch WebGL texImage2D to catch and suppress errors
      setTimeout(function() {
        var canvas = document.getElementById('usicv');
        if (!canvas) return;
        var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return;
        
        var origTexImage2D = gl.texImage2D;
        gl.texImage2D = function() {
          try {
            return origTexImage2D.apply(this, arguments);
          } catch(e) {
            console.warn('texImage2D error suppressed:', e.message);
            // Return without throwing - let rendering continue
          }
        };
      }, 500);
      
      console.log('ULTRA_DSG_MIN PATCH LOADED v1');
    })();
  </script>
  <script>
    // MVP stability patch: disable HDR environment loading.
    // Ultra's gate renderer uses RGBELoader/HDRCubeTextureLoader + PMREM for PBR lighting.
    // In our embed build we don't ship Ultra's HDR assets. Rather than fail boot,
    // we return a neutral 1x1 texture/cubemap so the renderer can proceed.
    (function(){
      if (!window.THREE) return;

      // Patch RGBELoader (equirectangular HDR)
      if (THREE.RGBELoader && THREE.RGBELoader.prototype) {
        THREE.RGBELoader.prototype.load = function(url, onLoad, onProgress, onError){
          try {
            var data = new Uint8Array([128, 128, 128, 255]);
            var tex = new THREE.DataTexture(data, 1, 1, THREE.RGBAFormat);
            tex.needsUpdate = true;
            tex.flipY = true;
            tex.magFilter = THREE.LinearFilter;
            tex.minFilter = THREE.LinearFilter;
            tex.generateMipmaps = false;
            tex.type = THREE.UnsignedByteType;
            if (THREE.EquirectangularReflectionMapping) {
              tex.mapping = THREE.EquirectangularReflectionMapping;
            }
            if (typeof onLoad === 'function') {
              setTimeout(function(){ onLoad(tex); }, 0);
            }
            return tex;
          } catch (e) {
            if (typeof onError === 'function') onError(e);
          }
        };
      }

      // Patch HDRCubeTextureLoader (cube HDR)
      if (THREE.HDRCubeTextureLoader && THREE.HDRCubeTextureLoader.prototype) {
        THREE.HDRCubeTextureLoader.prototype.load = function(urls, onLoad, onProgress, onError){
          try {
            // Provide a real 6-face 1x1 CubeTexture so downstream PMREM/material code doesn't
            // crash or silently render black.
            function faceCanvas(){
              var c = document.createElement('canvas');
              c.width = 1; c.height = 1;
              var ctx = c.getContext('2d');
              ctx.fillStyle = '#808080';
              ctx.fillRect(0,0,1,1);
              return c;
            }
            var faces = [faceCanvas(), faceCanvas(), faceCanvas(), faceCanvas(), faceCanvas(), faceCanvas()];
            var cube = new THREE.CubeTexture(faces);
            cube.needsUpdate = true;
            cube.magFilter = THREE.LinearFilter;
            cube.minFilter = THREE.LinearFilter;
            if (typeof onLoad === 'function') setTimeout(function(){ onLoad(cube); }, 0);
            return cube;
          } catch (e) {
            if (typeof onError === 'function') onError(e);
          }
        };
      }
    })();
  </script>
  <script src="js/CSSPlugin.min.js"></script>
  <script>
    // Patch THREE.JSONLoader to intercept and debug responses
    (function(){
      // Patch XHR to see raw responses
      var origOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        if (url && url.indexOf('.json') > -1 && url.indexOf('/m/') > -1) {
          this.addEventListener('load', function() {
            var contentType = this.getResponseHeader('Content-Type');
            var preview = this.responseText.substring(0, 200);
            console.log('XHR Response for', url);
            console.log('  Status:', this.status);
            console.log('  Content-Type:', contentType);
            console.log('  First 200 chars:', preview);
            
            // Check if response is actually JSON
            if (this.status === 200 && !contentType.includes('application/json')) {
              console.error('  ⚠️ WRONG CONTENT TYPE! Expected JSON, got:', contentType);
            }
            if (this.status === 200 && !preview.trim().startsWith('{')) {
              console.error('  ⚠️ RESPONSE IS NOT JSON! Starts with:', preview.substring(0, 50));
            }
          });
        }
        return origOpen.apply(this, arguments);
      };
      
      var originalLoad = THREE.JSONLoader.prototype.load;
      THREE.JSONLoader.prototype.load = function(url, onLoad, onProgress, onError) {
        // If URL starts with 'm/', prepend '/gate_tool/'
        if (url.indexOf('m/') === 0 || url.indexOf('./m/') === 0 || url.indexOf('t/') === 0 || url.indexOf('./t/') === 0) {
          url = '/gate_tool/' + url.replace('./', '');
        }
        console.log('Loading model:', url);
        return originalLoad.call(this, url, onLoad, onProgress, onError);
      };
    })();
  </script>
  <script>
    // Set asset path before Ultra loads
    var assetPathStr = '/gate_tool/';
  </script>
  <script>
    // Suppress Ultra's false-positive error handler
    setTimeout(function(){
      if (typeof window.onError === 'function') {
        window.onError = function(xhr) {
          console.log('Ultra onError suppressed for:', xhr?.currentTarget?.responseURL || xhr?.target?.responseURL);
        };
      }
    }, 50);
  </script>
  <script src="js/ultra_dsg_min.js"></script>
  <script>
    // Parent bridge: drive Ultra gate renderer without showing its UI.
    (function(){
      // Ultra init is async (loads textures/models). Queue commands until ready.
      var cmdQueue = [];
      var readyPoll = null;

      var readyStart = Date.now();
      var readyTimeoutMs = 30000; // increase timeout to 30s for slow model loading
      var probeDone = false;

      function showFatal(msg){
        console.error(msg);
        try {
          var el = document.getElementById('loadError');
          if (!el){
            el = document.createElement('div');
            el.id = 'loadError';
            el.style.position = 'fixed';
            el.style.left = '12px';
            el.style.right = '12px';
            el.style.top = '12px';
            el.style.zIndex = '99999';
            el.style.padding = '12px 14px';
            el.style.borderRadius = '10px';
            el.style.background = 'rgba(25,25,25,0.92)';
            el.style.color = '#fff';
            el.style.fontFamily = 'system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif';
            el.style.fontSize = '14px';
            el.style.lineHeight = '1.35';
            el.style.boxShadow = '0 6px 24px rgba(0,0,0,0.35)';
            document.body.appendChild(el);
          }
          el.textContent = msg;
        } catch(e) {}
      }

      function isReady(){
        // Ultra keeps most variables in closure
        // Just check if Ultra's public API functions are available
        return (
          typeof window.stlArr !== 'undefined' &&
          typeof window.gOpt === 'function' &&
          typeof window.stl === 'function' &&
          typeof window.rndr === 'function'
        );
      }

      function findStyleIndexByCode(code){
        if (!window.stlArr) return null;
        for (var i=0;i<window.stlArr.length;i++){
          if (window.stlArr[i] && window.stlArr[i].code === code) return i;
        }
        return null;
      }

      function ensureVisible(){
        var usi = document.getElementById('usi');
        if (usi) usi.style.display = 'block';
      }



      function applyStyleByCode(code){
        if (!isReady()) {
          console.log('Not ready yet, queueing style change');
          return false;
        }
        ensureVisible();
        var idx = findStyleIndexByCode(code);
        if (idx === null) return false;
        window.gN = idx;
        try {
          window.gOpt(true);
          window.stl(window.rndr);
          if (typeof window.kMnu === 'function') window.kMnu();
          return true;
        } catch(e) {
          console.error('Style apply failed:', e);
          return false;
        }
      }

      function resetGate(){
        if (!isReady()) return;
        ensureVisible();
        var idx = findStyleIndexByCode('UAF-200');
        if (idx === null) idx = 0;
        window.gN = idx;
        try {
          window.gOpt(true);
          window.stl(window.rndr);
          if (typeof window.kMnu === 'function') window.kMnu();
        } catch(e) {
          console.error('Reset failed:', e);
        }
      }

      function flushQueue(){
        if (!isReady()) return;
        if (readyPoll) { clearInterval(readyPoll); readyPoll = null; }
        
        // Let Ultra complete its natural initialization sequence
        // Ultra will call: cmp() → fseq(true) → viz() → fdin() → fi()
        // After fdin(), frun becomes false and we can take over
        
        // Hook into Ultra's completion
        var originalFi = window.fi;
        window.fi = function() {
          // Call original fi() if it exists
          if (typeof originalFi === 'function') {
            try { originalFi(); } catch(e) { console.warn('Original fi() error:', e); }
          }
          
          // Now Ultra is fully initialized with frun=false
          console.log('Ultra initialization complete, starting embed mode');
          
          // CRITICAL: Expose Ultra's internal variables globally for debugging
          if (typeof scene !== 'undefined') window.scene = scene;
          if (typeof camera !== 'undefined') window.camera = camera;
          if (typeof renderer !== 'undefined') window.renderer = renderer;
          
          // CRITICAL DIAGNOSTICS
          setTimeout(function() {
            console.log('=== GATE DIAGNOSTICS ===');
            console.log('Scene:', window.scene);
            console.log('Scene children:', window.scene?.children?.length || 0);
            console.log('Camera:', window.camera);
            console.log('Renderer:', window.renderer);
            console.log('Renderer.domElement:', window.renderer?.domElement);
            console.log('Renderer.domElement.id:', window.renderer?.domElement?.id);
            console.log('Canvas #usicv:', document.getElementById('usicv'));
            console.log('Canvas #bgCV:', document.getElementById('bgCV'));
            console.log('Canvas #fgCV:', document.getElementById('fgCV'));
            
            // CRITICAL FIX: Ultra's renderer is using a different canvas
            // Replace #usicv with the actual renderer canvas
            if (window.renderer && window.renderer.domElement) {
              var usi = document.getElementById('usi');
              var oldCanvas = document.getElementById('usicv');
              if (oldCanvas) oldCanvas.remove();
              window.renderer.domElement.id = 'usicv';
              window.renderer.domElement.className = 'cv';
              window.renderer.domElement.style.display = 'block';
              window.renderer.domElement.style.width = '100%';
              window.renderer.domElement.style.height = '100%';
              usi.appendChild(window.renderer.domElement);
              console.log('✅ Renderer canvas attached to #usi');
            
            // CRITICAL: Force canvas to stay visible
            var canvas = window.renderer.domElement;
            canvas.style.display = 'block';
            canvas.id = 'canvas';
            
            // Watch for style changes and keep it visible
            var observer = new MutationObserver(function() {
              if (canvas.style.display === 'none') {
                canvas.style.display = 'block';
                console.log('🔧 Canvas visibility restored');
              }
            });
            observer.observe(canvas, { attributes: true, attributeFilter: ['style'] });
            }
            
            // Check if anything is being rendered
            setTimeout(function() {
              console.log('=== RENDER CHECK ===');
              console.log('Scene visible children:', window.scene.children.filter(function(c){ return c.visible; }).length);
              console.log('Camera position:', window.camera.position);
              console.log('Camera looking at:', window.camera.rotation);
              if (window.renderer) {
                console.log('Renderer size:', window.renderer.getSize(new THREE.Vector2()));
                console.log('Renderer pixel ratio:', window.renderer.getPixelRatio());
              }
              console.log('===================');
            }, 1000);
            
            console.log('========================');
          }, 100);
          
          // Start continuous render loop
          function animate(){
            requestAnimationFrame(animate);
            if (typeof window.rndr === 'function') {
              window.rndr();
            }
          }
          animate();
          
          // Notify parent
          try {
            window.parent.postMessage({ type: 'GATE_READY' }, '*');
          } catch(e) {}
          
          // Process queued commands
          while(cmdQueue.length){
            var d = cmdQueue.shift();
            try {
              if (d.type === 'RESET_GATE') resetGate();
              if (d.type === 'SET_GATE_STYLE') applyStyleByCode(d.code);
            } catch(e) {
              console.error('Gate command error:', e);
              try {
                window.parent.postMessage({ type: 'GATE_ERROR', message: e.message }, '*');
              } catch(e2) {}
            }
          }
        };
        
        // Trigger Ultra's initialization by calling cmp() after materials are ready
        if (typeof window.cmp === 'function') {
          console.log('Triggering Ultra cmp() initialization');
          window.cmp();
        }
      }

      // Start polling immediately; once Ultra finishes init we can apply queued commands.
      readyPoll = setInterval(function(){
        if (isReady()) {
          flushQueue();
          return;
        }

        // After a short delay, probe for a known model file to surface missing-asset issues (404s).
        if (!probeDone && (Date.now() - readyStart) > 1500) {
          probeDone = true;
          var probes = [
            './m/0/po12.json',
            './m/0/pc4.json',
            './m/3/hng.json',
            'm/0/po12.json',
            'gate_tool/m/0/po12.json'
          ];
          (function tryProbe(i){
            if (i >= probes.length) return;
            fetch(probes[i], { cache: 'no-store' })
              .then(function(r){
                if (!r.ok) return tryProbe(i+1);
                // Found at least one model file; good sign.
                console.log('Model probe ok:', probes[i]);
              })
              .catch(function(){
                return tryProbe(i+1);
              });
          })(0);
        }

        // Hard timeout so we don't wait forever on staging/prod when assets are missing.
        if ((Date.now() - readyStart) > readyTimeoutMs) {
          if (readyPoll) { clearInterval(readyPoll); readyPoll = null; }
          var errMsg = '3D gate assets failed to load (timeout). Missing gate_tool/m/*.json models or incorrect deploy path. Open DevTools → Network and look for 404s on /m/ or /gate_tool/m/.';
          showFatal(errMsg);
          try {
            window.parent.postMessage({ type: 'GATE_ERROR', message: 'Gate assets failed to load' }, '*');
          } catch(e) {}
        }
      }, 100);

      window.addEventListener('message', function(ev){
        var d = ev.data || {};
        if (!d || !d.type) return;
        if (!isReady()) {
          cmdQueue.push(d);
          return;
        }
        if (d.type === 'SET_GATE_STYLE') applyStyleByCode(d.code);
        if (d.type === 'RESET_GATE') resetGate();
      });
    })();
  </script>
