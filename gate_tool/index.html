<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grandview Gate Tool</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="css/ultra_ds_g.css" />
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0b1220; }
    #mndv, #nv, #lg, #progress, #gb, #tx, #bg, #fg, #cv0, #cv_ns { display: none !important; }
    #main { width:100%; height:100%; position:relative; display:flex; align-items:center; justify-content:center; }
    #usi { display:block !important; width:100%; height:100%; }
    #usicv { display:block !important; width:100% !important; height:100% !important; position:relative !important; }
  </style>
</head>
<body>
  <div id="main">
    <div id="usi"><canvas id="usicv" class="cv" width="1960" height="1096"></canvas></div>
  </div>
  <script>
    (function(){
      if (!window.WebGLRenderingContext) {
        document.body.innerHTML = '<div style="padding:40px;color:#fff;text-align:center;font-family:sans-serif;"><h2>WebGL Not Available</h2><p>Please enable hardware acceleration in your browser settings.</p></div>';
      }
    })();
  </script>
  <script src="js/jqmin.js"></script>
  <script src="js/jqm_min.js"></script>
  <script src="js/iscroll-lite.js"></script>
<script>
    // Patches for legacy script are removed to avoid conflicts.
    window.Detector = { webgl: true };
    window.assetPathStr = '';
  </script>
  <script src="js/GateTool.js"></script>
  <script>
    const stlArr = [
      { dv:'200 Series' },
      { code: 'UAF-200', mod: '200' }
      // Other style data would go here
    ];

    // Minimal init sequence to get the scene running
    const gateTool = new GateTool(stlArr);
    gateTool.init();
    gateTool.start();
    // gateTool.gOpt(true); // Old logic is disabled for force-load test
  </script>
</body>
</html>
